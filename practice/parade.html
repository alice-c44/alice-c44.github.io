<!DOCTYPE html>
<html lang="en">
	<head>
		<title>Parade</title>
<style>
canvas{
	border:1px solid pink;
}
</style>
	</head>
	<body>
	
		<canvas id ="myCanvas"
			width=800
			height=500>
		</canvas>
		<script>
const canvas=document
.getElementById("myCanvas");
const ctx=canvas.getContext("2d");
let x=1;
let x2=1;
let x3=1;
let x4=1;
let x5=1;
let speed=3;
let speed2=2;
let speed3=4;
let speed4=5;
let speed5=1;
let time=0;
let isMoving=false;

function animate(){
	time=time+1;
	x=x+speed;
	x2=x2+speed2;
	x3=x3+speed3;
	x4=x4+speed4;
x5=x5+speed5;

	if(time<160){
		x=x+speed;
	}
	if(time>600){
		x3=x3+speed3;
	}
	if(time>800){
		x4=0;
	}
	if(time>800){
		x5=0;
	}
	if(time<200){
		x5=x5+speed5;
	}
	ctx.clearRect(0,0,800,800);
	
	ctx.fillStyle="pink";
	ctx.fillRect(x,100,30,30);

	ctx.fillStyle="green";
	ctx.fillRect(x2,200,30,30);

	ctx.fillStyle="yellow";
	ctx.fillRect(x3,300,30,30);

	ctx.fillStyle="purple";
	ctx.fillRect(x4,400,30,30);

	ctx.beginPath();
    ctx.arc(x5, 50, 30, 0, Math.PI * 2);
    ctx.fillStyle = "blue";
   ctx.fill();
   ctx.closePath();

	window.addEventListener('keydown',(e)=>{
		if (e.code ==='Space'){
			isMoving=true;
			e.preventDefault();
		}
	});
requestAnimationFrame(animate);
}

animate();
		</script>
	</body>
</html>
